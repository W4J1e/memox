dev:
  push:
    - name: build-debug-apk
      runner:
        cpus: 8
      docker:
        build:
          dockerfile: Dockerfile.build
      stages:
        - name: build-apk
          script: |
            echo "sdk.dir=$ANDROID_HOME" > local.properties
            ./gradlew assembleDebug --no-daemon
        - name: upload-apk
          image: node:20
          script: |
            APK_PATH=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -1)
            echo "Found APK: $APK_PATH"
            APK_NAME=$(basename "$APK_PATH")
            APK_SIZE=$(stat -c%s "$APK_PATH")
            echo "APK: $APK_NAME, Size: $APK_SIZE bytes"
            RESPONSE=$(curl -s -X POST "https://cnb.cool/api/v1/hin/NotallyX/issues/4/comment/file-asset-upload-url" \
              -H "Authorization: Bearer $CNB_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"name\": \"$APK_NAME\", \"size\": $APK_SIZE}")
            echo "Upload URL response: $RESPONSE"
            UPLOAD_URL=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['upload_url'])" 2>/dev/null)
            ASSET_LINK=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['asset_link'])" 2>/dev/null)
            if [ -z "$UPLOAD_URL" ]; then
              echo "Failed to get upload URL"
              exit 1
            fi
            echo "Uploading APK to: $UPLOAD_URL"
            curl -s -X PUT "$UPLOAD_URL" -H "Content-Type: application/octet-stream" --data-binary @"$APK_PATH"
            echo "Upload complete. Asset link: $ASSET_LINK"
            curl -s -X POST "https://cnb.cool/api/v1/hin/NotallyX/issues/4/comments" \
              -H "Authorization: Bearer $CNB_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"body\": \"📦 Debug APK 构建完成：$ASSET_LINK\"}"
            echo "Comment posted to issue #4"
