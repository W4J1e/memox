dev:
  push:
    - name: build-debug-apk
      runner:
        cpus: 8
      docker:
        build:
          dockerfile: Dockerfile.build
      stages:
        - name: build-apk
          script: |
            echo "sdk.dir=$ANDROID_HOME" > local.properties
            ./gradlew assembleDebug --no-daemon
        - name: upload-apk
          image: curlimages/curl:latest
          script: |
            APK_PATH=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -1)
            echo "Found APK: $APK_PATH"
            if [ -z "$APK_PATH" ]; then
              echo "No APK found, aborting upload"
              exit 1
            fi
            APK_NAME=$(basename "$APK_PATH")
            echo "Uploading $APK_NAME to GoFile..."
            RESPONSE=$(curl -s -X POST https://upload.gofile.io/uploadfile \
              -F "file=@$APK_PATH")
            echo "GoFile response: $RESPONSE"
            DOWNLOAD_PAGE=$(echo "$RESPONSE" | grep -o '"downloadPage":"[^"]*"' | head -1 | cut -d'"' -f4)
            if [ -z "$DOWNLOAD_PAGE" ]; then
              echo "Failed to upload APK to GoFile"
              exit 1
            fi
            echo "============================================"
            echo "APK download link: https://gofile.io${DOWNLOAD_PAGE}"
            echo "============================================"
